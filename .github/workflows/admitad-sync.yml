name: Admitad Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-admitad:
    runs-on: ubuntu-latest
    # ⛔ ВАЖНО: Строки environment: быть НЕ ДОЛЖНО!
    # Иначе GitHub может не передать Repository secrets.
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 🔥 Проверка: остановит сборку, если секрет пустой
      - name: 🔍 Проверка секретов
        run: |
          echo "Проверяю наличие секретов..."
          
          if [ -z "${{ secrets.ADMITAD_CLIENT_ID }}" ]; then
            echo "❌ ОШИБКА: ADMITAD_CLIENT_ID пустой!"
            echo "GitHub не видит этот секрет в Repository Secrets."
            echo "Проверь Settings → Secrets and variables → Actions → Repository secrets."
            echo "Убедись, что секрет создан именно как SECRET, а не VARIABLE."
            exit 1
          fi
          
          echo "✅ ADMITAD_CLIENT_ID присутствует!"

      - name: Install
        run: npm ci
        
      - name: Run Parser
        env:
          ADMITAD_CLIENT_ID: ${{ secrets.ADMITAD_CLIENT_ID }}
          ADMITAD_CLIENT_SECRET: ${{ secrets.ADMITAD_CLIENT_SECRET }}
          ADMITAD_WEBSITE_ID: ${{ secrets.ADMITAD_WEBSITE_ID }}
        run: node scripts/admitad-parser.js
        
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/admitad-data.json
          git diff --staged --quiet || git commit -m "🔄 Update Admitad data [skip ci]"
          git push
