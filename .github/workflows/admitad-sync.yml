name: Admitad Curl Debug

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔥 Тест токена через curl с отладкой
        run: |
          set -x  # Вывод каждой команды для отладки
          
          echo "Проверка curl..."
          curl --version
          
          echo "Формирование заголовка..."
          AUTH_HEADER=$(echo -n "${{ secrets.ADMITAD_CLIENT_ID }}:${{ secrets.ADMITAD_CLIENT_SECRET }}" | base64)
          echo "Заголовок сформирован."
          
          echo "Отправка запроса..."
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST https://api.admitad.com/token/ \
            -H "Authorization: Basic $AUTH_HEADER" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&scope=advcampaigns advcampaigns_for_website public_data")
          
          CURL_EXIT=$?
          echo "Curl exit code: $CURL_EXIT"
          
          echo "Ответ от Admitad:"
          echo "$RESPONSE"
          
          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ Curl завершился с ошибкой $CURL_EXIT"
            exit 1
          fi
          
          if echo "$RESPONSE" | grep -q '"access_token"'; then
            echo "✅ Токен получен! Секреты работают."
          else
            echo "❌ Токен не получен. Проверь ответ выше."
            exit 1
          fi
