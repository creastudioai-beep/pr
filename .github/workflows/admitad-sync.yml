name: Admitad Curl Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔥 Тест токена через curl
        run: |
          echo "Отправляю запрос через curl..."
          
          # Формируем заголовок
          AUTH_HEADER=$(echo -n "${{ secrets.ADMITAD_CLIENT_ID }}:${{ secrets.ADMITAD_CLIENT_SECRET }}" | base64)
          
          # Делаем запрос
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST https://api.admitad.com/token/ \
            -H "Authorization: Basic $AUTH_HEADER" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&scope=advcampaigns advcampaigns_for_website public_data")
          
          # Выводим результат
          echo "Ответ от Admitad:"
          echo "$RESPONSE"
          
          # Проверяем успех
          if echo "$RESPONSE" | grep -q '"access_token"'; then
            echo "✅ Токен получен! Секреты работают. Проблема в парсере."
          else
            echo "❌ Ошибка. Секреты не работают или доступ закрыт."
            exit 1
          fi
