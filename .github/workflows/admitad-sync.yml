name: Sync Admitad Ads

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Добавляем разрешения для GITHUB_TOKEN
permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Admitad parser
        env:
          BASE64_HEADER: ${{ secrets.BASE64_HEADER }}
        run: node scripts/admitad-fetch.js

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data/admitad_ads.json
          git diff --staged --quiet || git commit -m "Update Admitad ads data"
          git push
