name: Admitad Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-admitad:
    runs-on: ubuntu-latest
    # ⛔ ВАЖНО: Строки environment: быть НЕ ДОЛЖНО!
    # Если она есть, GitHub игнорирует Repository secrets.
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 🔍 Debug-шаг покажет, видит ли GitHub секреты
      - name: 🔍 Проверка секретов
        run: |
          echo "Проверяю наличие секретов в Repository Secrets..."
          
          if [ -z "${{ secrets.ADMITAD_CLIENT_ID }}" ]; then
            echo "❌ ОШИБКА: ADMITAD_CLIENT_ID пустой!"
            echo "GitHub не видит этот секрет в Repository Secrets."
            echo "1. Проверь Settings → Secrets and variables → Actions → Repository secrets."
            echo "2. Убедись, что секрет НЕ во вкладке Variables."
            echo "3. Убедись, что в workflow нет строки 'environment:'."
            exit 1
          fi
          
          if [ -z "${{ secrets.ADMITAD_CLIENT_SECRET }}" ]; then
            echo "❌ ОШИБКА: ADMITAD_CLIENT_SECRET пустой!"
            exit 1
          fi
          
          if [ -z "${{ secrets.ADMITAD_WEBSITE_ID }}" ]; then
            echo "❌ ОШИБКА: ADMITAD_WEBSITE_ID пустой!"
            exit 1
          fi
          
          echo "✅ Все секреты присутствуют!"

      - name: Install
        run: npm ci
        
      - name: Run Parser
        env:
          ADMITAD_CLIENT_ID: ${{ secrets.ADMITAD_CLIENT_ID }}
          ADMITAD_CLIENT_SECRET: ${{ secrets.ADMITAD_CLIENT_SECRET }}
          ADMITAD_WEBSITE_ID: ${{ secrets.ADMITAD_WEBSITE_ID }}
        run: node scripts/admitad-parser.js
        
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/admitad-data.json
          git diff --staged --quiet || git commit -m "🔄 Update Admitad data [skip ci]"
          git push
