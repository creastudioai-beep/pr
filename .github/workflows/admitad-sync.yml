name: Admitad Curl Fixed

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔥 Тест токена через curl (FIXED)
        run: |
          set -x
          
          echo "Формирование заголовка с base64 -w 0..."
          # -w 0 отключает переносы строк!
          AUTH_HEADER=$(echo -n "${{ secrets.ADMITAD_CLIENT_ID }}:${{ secrets.ADMITAD_CLIENT_SECRET }}" | base64 -w 0)
          
          echo "Длина заголовка: ${#AUTH_HEADER}"
          
          echo "Отправка запроса..."
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST https://api.admitad.com/token/ \
            -H "Authorization: Basic $AUTH_HEADER" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&scope=advcampaigns advcampaigns_for_website public_data")
          
          CURL_EXIT=$?
          echo "Curl exit code: $CURL_EXIT"
          
          echo "Ответ от Admitad:"
          echo "$RESPONSE"
          
          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ Curl упал с кодом $CURL_EXIT"
            exit 1
          fi
          
          if echo "$RESPONSE" | grep -q '"access_token"'; then
            echo "✅ ТОКЕН ПОЛУЧЕН! Секреты работают."
            echo "Проблема была в base64 без -w 0 или в парсере."
          else
            echo "❌ Токен не получен. Проверь ответ выше."
            exit 1
          fi
