name: Sync Admitad Ads

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:      # ручной запуск

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # актуальная LTS на 2026 год

      - name: Run Admitad parser
        env:
          ADMITAD_CLIENT_ID: ${{ secrets.ADMITAD_CLIENT_ID }}
          ADMITAD_CLIENT_SECRET: ${{ secrets.ADMITAD_CLIENT_SECRET }}
        run: node scripts/admitad-fetch.js

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data/admitad_ads.json
          git diff --staged --quiet || git commit -m "Update Admitad ads data"
          git push
