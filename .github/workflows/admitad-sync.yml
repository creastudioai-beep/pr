name: Admitad Data Sync

on:
  workflow_dispatch:

jobs:
  sync-admitad:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 🔍 Проверка секретов
      - name: 🔍 Проверка секретов
        run: |
          echo "Проверяю наличие секретов..."
          
          if [ -z "${{ secrets.ADMITAD_AUTH_HEADER }}" ]; then
            echo "❌ ОШИБКА: ADMITAD_AUTH_HEADER пустой!"
            echo "Создай секрет ADMITAD_AUTH_HEADER в Repository secrets."
            exit 1
          fi
          
          if [ -z "${{ secrets.ADMITAD_CLIENT_ID }}" ]; then
            echo "❌ ОШИБКА: ADMITAD_CLIENT_ID пустой!"
            exit 1
          fi
          
          echo "✅ Все секреты присутствуют!"

      - name: Install
        run: npm ci
        
      - name: Run Parser
        env:
          ADMITAD_AUTH_HEADER: ${{ secrets.ADMITAD_AUTH_HEADER }}
          ADMITAD_CLIENT_ID: ${{ secrets.ADMITAD_CLIENT_ID }}
          ADMITAD_CLIENT_SECRET: ${{ secrets.ADMITAD_CLIENT_SECRET }}
          ADMITAD_WEBSITE_ID: ${{ secrets.ADMITAD_WEBSITE_ID }}
        run: node scripts/admitad-parser.js
        
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/admitad-data.json
          git diff --staged --quiet || git commit -m "🔄 Update Admitad data [skip ci]"
          git push
