name: Admitad Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-admitad:
    runs-on: ubuntu-latest
    # ⛔ ВАЖНО: Строки environment: быть НЕ должно!
    # Иначе GitHub игнорирует Repository secrets.
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 🔍 Debug-шаг покажет, видит ли GitHub секреты
      - name: 🔍 Debug Secrets
        run: |
          echo "Checking secrets availability..."
          echo "ADMITAD_CLIENT_ID present: ${{ secrets.ADMITAD_CLIENT_ID != '' }}"
          echo "ADMITAD_CLIENT_SECRET present: ${{ secrets.ADMITAD_CLIENT_SECRET != '' }}"
          echo "ADMITAD_WEBSITE_ID present: ${{ secrets.ADMITAD_WEBSITE_ID != '' }}"
          
          if [ "${{ secrets.ADMITAD_CLIENT_ID }}" = "" ]; then
            echo "❌ ERROR: ADMITAD_CLIENT_ID is empty! Check Repository Secrets."
            exit 1
          fi
          if [ "${{ secrets.ADMITAD_CLIENT_SECRET }}" = "" ]; then
            echo "❌ ERROR: ADMITAD_CLIENT_SECRET is empty! Check Repository Secrets."
            exit 1
          fi
          if [ "${{ secrets.ADMITAD_WEBSITE_ID }}" = "" ]; then
            echo "❌ ERROR: ADMITAD_WEBSITE_ID is empty! Check Repository Secrets."
            exit 1
          fi
          
          echo "✅ All secrets are present!"

      - name: Install dependencies
        run: npm ci
        
      - name: Run Admitad Parser
        env:
          ADMITAD_CLIENT_ID: ${{ secrets.ADMITAD_CLIENT_ID }}
          ADMITAD_CLIENT_SECRET: ${{ secrets.ADMITAD_CLIENT_SECRET }}
          ADMITAD_WEBSITE_ID: ${{ secrets.ADMITAD_WEBSITE_ID }}
        run: node scripts/admitad-parser.js
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/admitad-data.json
          git diff --staged --quiet || git commit -m "🔄 Update Admitad data [skip ci]"
          git push
